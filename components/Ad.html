<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Please Wait...</title>
  <meta property="og:title" content="🎁 Exclusive Link Inside" />
  <meta property="og:description" content="Tap to unlock your link. Wait a few seconds..." />
  <meta property="og:image" content="https://placehold.co/600x315/0f172a/38bdf8?text=Loading+Your+Link" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e; --card: #111827; --accent: #38bdf8;
      --accent2: #818cf8; --text: #f1f5f9; --muted: #64748b;
      --border: rgba(56,189,248,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; overflow: hidden;
    }

    /* ── PHASE 1: Interstitial card ── */
    #phase1 {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem; position: relative;
    }

    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 8s ease-in-out infinite alternate; pointer-events: none; }
    .blob1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; left: -100px; }
    .blob2 { width: 350px; height: 350px; background: #818cf8; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 250px; height: 250px; background: #34d399; top: 40%; left: 50%; animation-delay: 4s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

    .card {
      position: relative; background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 2.5rem 2rem; max-width: 420px; width: 100%;
      text-align: center; box-shadow: 0 0 60px rgba(56,189,248,0.07), 0 20px 40px rgba(0,0,0,0.4);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(30px) scale(0.96); } to { opacity:1; transform: none; } }

    .badge {
      display: inline-block; background: rgba(56,189,248,0.12);
      border: 1px solid rgba(56,189,248,0.3); color: var(--accent);
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 0.3rem 0.9rem; border-radius: 999px; margin-bottom: 1.4rem;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800; line-height: 1.15; margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #f1f5f9 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--muted); font-size: 0.92rem; margin-bottom: 2rem; line-height: 1.6; }

    .ring-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 2rem; }
    svg.ring { transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 6; }
    .ring-fill {
      fill: none; stroke: url(#grad); stroke-width: 6; stroke-linecap: round;
      stroke-dasharray: 283; stroke-dashoffset: 283; transition: stroke-dashoffset 1s linear;
    }
    .ring-number { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-number span {
      font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .ring-number small { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    .progress-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-bar { height: 100%; width: 0%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1s linear; }

    .btn {
      display: block; width: 100%; padding: 0.9rem 1.5rem; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-wait { background: rgba(255,255,255,0.05); color: var(--muted); cursor: not-allowed; border: 1px solid rgba(255,255,255,0.07); }
    .btn-go {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0a0f1e;
      box-shadow: 0 4px 20px rgba(56,189,248,0.35); animation: pulse 2s ease-in-out infinite;
    }
    .btn-go:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(56,189,248,0.45); }
    @keyframes pulse { 0%,100%{ box-shadow: 0 4px 20px rgba(56,189,248,0.35);} 50%{ box-shadow: 0 4px 30px rgba(56,189,248,0.6);} }
    .footer-note { margin-top: 1.2rem; font-size: 0.75rem; color: var(--muted); }

    /* ── PHASE 2: Ad iframe wrapper ── */
    #phase2 {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      flex-direction: column;
      background: #000;
    }

    #phase2.active { display: flex; }

    .ad-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem;
      background: #0a0f1e;
      border-bottom: 1px solid rgba(56,189,248,0.15);
      flex-shrink: 0;
    }
    .ad-topbar-left { font-size: 0.75rem; color: var(--muted); }
    .ad-topbar-left strong { color: var(--accent); }

    .ad-skip-btn {
      background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3);
      color: var(--muted); border-radius: 999px; padding: 0.3rem 1rem;
      font-size: 0.75rem; font-weight: 600; cursor: not-allowed;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
      white-space: nowrap;
    }
    .ad-skip-btn.ready {
      color: var(--accent); cursor: pointer; background: rgba(56,189,248,0.15);
      border-color: var(--accent);
    }
    .ad-skip-btn.ready:hover { background: var(--accent); color: #0a0f1e; }

    #adFrame {
      flex: 1; width: 100%; border: none;
    }
  </style>
</head>
<body>

  <!-- PHASE 1: Your branded countdown page -->
  <div id="phase1">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="card">
      <div class="badge">⚡ Smart Link</div>
      <h1>Your Link is<br>Ready!</h1>
      <p class="subtitle">Tap the button below to open himanga.fun. This helps keep the content free.</p>

      <div class="ring-wrap">
        <svg class="ring" width="110" height="110" viewBox="0 0 110 110">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#38bdf8"/>
              <stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="55" cy="55" r="45"/>
          <circle class="ring-fill" id="ringFill" cx="55" cy="55" r="45"/>
        </svg>
        <div class="ring-number">
          <span id="countNum">5</span>
          <small id="countLabel">secs</small>
        </div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <button class="btn btn-wait" id="continueBtn" disabled onclick="showAd()">
        ⏳ Please wait...
      </button>

      <p class="footer-note" id="footerNote">Ad will load, then you go to himanga.fun</p>
    </div>
  </div>

  <!-- PHASE 2: Ad iframe fullscreen with skip bar -->
  <div id="phase2">
    <div class="ad-topbar">
      <div class="ad-topbar-left">Ad • Redirecting to <strong>himanga.fun</strong> in <strong id="skipCount">8</strong>s</div>
      <button class="ad-skip-btn" id="skipBtn" onclick="goToHimanga()">⏳ Wait...</button>
    </div>
    <iframe id="adFrame" scrolling="yes" allowfullscreen></iframe>
  </div>

<script>
  const WAIT     = 5;   // seconds on your branded page
  const AD_WAIT  = 8;   // seconds to show the ad before redirecting
  const AD       = 'https://www.effectivegatecpm.com/hbk98sjq?key=67f2c5a7a9af8e30695edaa7a8c81650';
  const DEST     = 'https://himanga.fun';

  const ring = document.getElementById('ringFill');
  const num  = document.getElementById('countNum');
  const btn  = document.getElementById('continueBtn');
  const bar  = document.getElementById('progressBar');
  const note = document.getElementById('footerNote');
  const circ = 283;
  let remaining = WAIT;
  let done = false;

  // ── Phase 1 countdown ──
  const timer = setInterval(() => {
    remaining--;
    num.textContent = remaining;
    const progress = (WAIT - remaining) / WAIT;
    ring.style.strokeDashoffset = circ - (circ * progress);
    bar.style.width = (progress * 100) + '%';

    if (remaining <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.className = 'btn btn-go';
      btn.textContent = '🚀 Open himanga.fun';
      note.textContent = 'Tap to continue →';
      num.textContent = '✓';
      document.getElementById('countLabel').textContent = '';
      setTimeout(showAd, 1500);
    }
  }, 1000);

  // ── Phase 2: show ad in iframe ──
  function showAd() {
    if (done) return;
    done = true;
    clearInterval(timer);

    // Switch to ad phase
    document.getElementById('phase1').style.display = 'none';
    const phase2 = document.getElementById('phase2');
    phase2.classList.add('active');

    // Load ad into iframe
    document.getElementById('adFrame').src = AD;

    // Start skip countdown
    let skipRemaining = AD_WAIT;
    const skipEl = document.getElementById('skipCount');
    const skipBtn = document.getElementById('skipBtn');

    const skipTimer = setInterval(() => {
      skipRemaining--;
      skipEl.textContent = skipRemaining;

      if (skipRemaining <= 0) {
        clearInterval(skipTimer);
        skipBtn.textContent = '→ Go to himanga.fun';
        skipBtn.classList.add('ready');
        // Auto redirect
        setTimeout(goToHimanga, 1000);
      }
    }, 1000);
  }

  function goToHimanga() {
    window.location.href = DEST;
  }
</script>
</body>
</html>
